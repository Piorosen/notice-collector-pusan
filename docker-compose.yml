services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: automatic_notice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ingestor:
    build:
      context: ./apps/ingestor
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/automatic_notice
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./storage:/workspace/storage
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
    env_file:
      - .env
    environment:
      INGESTOR_BASE_URL: http://ingestor:8000
      NEXT_PUBLIC_INGESTOR_BASE_URL: http://localhost:8000
    depends_on:
      - ingestor
    ports:
      - "3000:3000"

volumes:
  pgdata:
